root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ."
  entrypoint = ["./tmp/main", "serve"]
  delay = 1000
  exclude_dir = ["assets", "tmp", "pb_data", "vendor", "testdata"]
  exclude_regex = ["_templ\\.go$", "_test\\.go$"]
  include_ext = ["go", "templ"]
  kill_delay = "0s"
  send_interrupt = true
  stop_on_error = false

[log]
  time = false
